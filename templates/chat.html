<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ramp emerging talent — Claude</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --surface: #fff;
      --border: #e8e8e6;
      --text: #1a1a1a;
      --text-muted: #888;
      --text-faint: #bbb;
      --input-bg: #fff;
      --bubble-assistant-bg: #fff;
      --bubble-assistant-border: #e8e8e6;
      --bubble-user-bg: #000;
      --bubble-user-color: #fff;
      --avatar-user-bg: #e8e8e6;
      --avatar-user-color: #000;
      --tab-bg: #fafaf8;
    }

    html.dark {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --text-muted: #888;
      --text-faint: #444;
      --input-bg: #1a1a1a;
      --bubble-assistant-bg: #1e1e1e;
      --bubble-assistant-border: #2e2e2e;
      --bubble-user-bg: #e8ff47;
      --bubble-user-color: #000;
      --avatar-user-bg: #2e2e2e;
      --avatar-user-color: #f0f0f0;
      --tab-bg: #222;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.2s, color 0.2s;
    }

    header {
      background: #000;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 18px; font-weight: 700; }
    .ramp-logo { width: 26px; height: 26px; border-radius: 50%; }
    .divider { opacity: 0.3; }
    .subtitle { font-size: 13px; opacity: 0.6; }
    .header-right { display: flex; align-items: center; gap: 12px; }

    .leaderboard-link {
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      opacity: 0.6;
      transition: opacity 0.15s;
    }
    .leaderboard-link:hover { opacity: 1; }

    .key-widget {
      display: none;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 4px 10px 4px 12px;
      border-radius: 99px;
    }
    .key-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      opacity: 0.45;
      font-weight: 600;
      color: #fff;
    }
    .key-badge {
      font-family: monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.7);
    }
    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      opacity: 0.5;
      padding: 0 0 0 2px;
      line-height: 1;
      transition: opacity 0.15s;
      color: #fff;
    }
    .copy-btn:hover { opacity: 1; }

    .theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      opacity: 0.6;
      transition: opacity 0.15s;
      padding: 2px 4px;
      line-height: 1;
    }
    .theme-toggle:hover { opacity: 1; }

    /* ── auth background canvas ── */
    #auth-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.4s;
    }
    #auth-canvas.hidden { opacity: 0; }

    /* ── auth gate ── */
    #auth-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid #e8ff47;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      color: var(--text);
    }

    html.dark .auth-card {
      box-shadow: 0 4px 32px rgba(0,0,0,0.6);
    }

    .auth-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; text-transform: lowercase; }
    .auth-card p { text-transform: lowercase; }
    .tab { text-transform: lowercase; }
    .btn-primary { text-transform: lowercase; }
    .empty-state p { text-transform: lowercase; }
    .subtitle { text-transform: lowercase; }
    .model-label { text-transform: lowercase !important; }
    .auth-card p { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }

    .tabs {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: var(--tab-bg);
      border: none;
      color: var(--text-muted);
      transition: all 0.15s;
    }
    .tab.active { background: #000; color: #fff; }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.15s, background 0.2s, color 0.2s;
      background: var(--input-bg);
      color: var(--text);
    }
    input:focus { border-color: #888; }

    .btn-primary {
      width: 100%;
      padding: 9px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-primary:hover { border-color: #888; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .auth-error {
      font-size: 13px;
      color: #c00;
      margin-top: 12px;
      min-height: 18px;
    }

    /* ── chat ── */
    #chat-screen {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      display: flex;
      gap: 12px;
      max-width: 720px;
      width: 100%;
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }
    .msg.assistant .avatar { background: #000; color: #fff; }
    .msg.user .avatar { background: var(--avatar-user-bg); color: var(--avatar-user-color); }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      max-width: calc(100% - 44px);
      white-space: pre-wrap;
      word-break: break-word;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .msg.assistant .bubble {
      background: var(--bubble-assistant-bg);
      border: 1px solid var(--bubble-assistant-border);
      border-radius: 4px 12px 12px 12px;
    }
    .msg.user .bubble {
      background: var(--bubble-user-bg);
      color: var(--bubble-user-color);
      border-radius: 12px 4px 12px 12px;
    }

    .typing .bubble { color: var(--text-faint); font-style: italic; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-faint);
      gap: 8px;
      text-align: center;
      padding: 48px 24px;
    }
    .empty-state .icon { font-size: 40px; }
    .empty-state p { font-size: 14px; }

    /* ── input bar ── */
    .input-bar {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }

    textarea {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color 0.15s, background 0.2s, color 0.2s;
      background: var(--input-bg);
      color: var(--text);
    }
    textarea:focus { border-color: #888; }

    .send-btn {
      width: 40px;
      height: 40px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .send-btn:not(:disabled):hover { opacity: 0.8; }
    .send-btn svg { width: 16px; height: 16px; }

    .model-bar {
      padding: 8px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }

    .model-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
    }

    .model-pills {
      display: flex;
      gap: 6px;
    }

    .model-pill {
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-muted);
      transition: all 0.15s;
      font-family: inherit;
    }

    .model-pill:hover { border-color: #888; color: var(--text); }

    .model-pill.active {
      background: #000;
      color: #fff;
      border-color: #000;
    }

    html.dark .model-pill.active {
      background: #e8ff47;
      color: #000;
      border-color: #e8ff47;
    }

    .model-pill .pill-tag {
      font-size: 10px;
      opacity: 0.6;
      margin-left: 4px;
    }

    /* ── file attachments ── */
    .attach-btn {
      width: 36px; height: 36px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: var(--text-muted);
      font-size: 16px;
      transition: border-color 0.15s, color 0.15s;
    }
    .attach-btn:hover { border-color: #888; color: var(--text); }

    .stop-btn {
      width: 40px; height: 40px;
      background: #c00;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: none;
      align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
      transition: opacity 0.15s;
    }
    .stop-btn:hover { opacity: 0.8; }

    .clear-btn {
      font-size: 11px;
      color: var(--text-faint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 4px;
      transition: color 0.15s;
    }
    .clear-btn:hover { color: var(--text-muted); }

    .attachments-preview {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px 24px 0;
    }

    .attachment-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .attachment-chip img {
      width: 32px; height: 32px;
      object-fit: cover;
      border-radius: 4px;
    }

    .attachment-chip .remove-att {
      cursor: pointer;
      opacity: 0.5;
      font-size: 14px;
      line-height: 1;
      background: none;
      border: none;
      color: inherit;
      padding: 0;
    }
    .attachment-chip .remove-att:hover { opacity: 1; }

    .drag-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      display: none;
      align-items: center; justify-content: center;
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      pointer-events: none;
    }
    body.dragging .drag-overlay { display: flex; }

    /* ── markdown rendering ── */
    .bubble.md { white-space: normal; }
    .bubble.md p { margin-bottom: 10px; }
    .bubble.md p:last-child { margin-bottom: 0; }
    .bubble.md ul, .bubble.md ol { margin: 8px 0 8px 20px; }
    .bubble.md li { margin-bottom: 4px; }
    .bubble.md strong { font-weight: 700; }
    .bubble.md em { font-style: italic; }
    .bubble.md h1,.bubble.md h2,.bubble.md h3 { font-weight: 700; margin: 12px 0 6px; }
    .bubble.md h1 { font-size: 18px; }
    .bubble.md h2 { font-size: 16px; }
    .bubble.md h3 { font-size: 14px; }
    .bubble.md a { color: #0066cc; text-decoration: underline; }
    .bubble.md blockquote {
      border-left: 3px solid var(--border);
      padding-left: 12px;
      color: var(--text-muted);
      margin: 8px 0;
    }

    .bubble.md pre {
      background: #1a1a1a;
      color: #f0f0f0;
      border-radius: 8px;
      padding: 12px 14px;
      overflow-x: auto;
      margin: 10px 0;
      font-size: 13px;
      line-height: 1.5;
      position: relative;
    }
    html:not(.dark) .bubble.md pre { background: #1e1e1e; }

    .bubble.md code:not(pre code) {
      background: var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 12px;
      font-family: monospace;
    }

    .copy-code-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #aaa;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .copy-code-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

    .msg-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .msg:hover .msg-actions { opacity: 1; }
    .msg-action-btn {
      font-size: 11px;
      color: var(--text-faint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.1s, color 0.1s;
    }
    .msg-action-btn:hover { background: var(--border); color: var(--text-muted); }

    /* ── streaming cursor ── */
    .stream-cursor::after {
      content: '▋';
      animation: blink 0.8s step-end infinite;
      opacity: 1;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── input bar extras ── */
    .input-bar { flex-wrap: wrap; }
    .input-row { display: flex; gap: 10px; align-items: flex-end; width: 100%; }
    .input-meta { display: flex; align-items: center; justify-content: space-between; width: 100%; font-size: 11px; color: var(--text-faint); padding-top: 4px; }
  </style>
</head>
<body>

<canvas id="auth-canvas"></canvas>

<header>
  <div class="header-left">
    <img src="/static/pixel.png" class="ramp-logo" alt="Ramp" />
    <span class="divider">|</span>
    <span class="subtitle">emerging talent</span>
  </div>
  <div class="header-right">
    <a href="/leaderboard" class="leaderboard-link">leaderboard</a>
    <div class="key-widget" id="key-widget">
      <span class="key-label">api key</span>
      <span class="key-badge" id="key-display"></span>
      <button class="copy-btn" id="copy-btn" onclick="copyKey()" title="copy full key">📋</button>
    </div>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="toggle dark mode">🌙</button>
  </div>
</header>

<!-- Auth gate -->
<div id="auth-screen">
  <div class="auth-card" data-bg-card>
    <h2>ready to build?</h2>
    <p>sign in with your api key, or register if you're new.</p>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">i have a key</button>
      <button class="tab" onclick="switchTab('register')">new here</button>
    </div>

    <div id="login-form">
      <input id="login-key" type="text" placeholder="paste your api key (tc-...)" />
      <button class="btn-primary" onclick="login()">enter</button>
    </div>

    <div id="register-form" style="display:none">
      <input id="reg-name" type="text" placeholder="your name" />
      <input id="reg-email" type="email" placeholder="your email" />
      <button class="btn-primary" onclick="register()">get my key</button>
    </div>

    <div class="auth-error" id="auth-error"></div>
    <p style="margin-top: 16px; font-size: 12px; color: var(--text-faint);">have fun! ٩(^ᗜ^ )و</p>
    <div style="margin-top: 10px;"><span style="display: inline-flex; align-items: center; gap: 5px; background: rgba(232,255,71,0.08); border: 1px solid rgba(232,255,71,0.2); border-radius: 99px; padding: 3px 10px; font-size: 10px; color: #e8ff47;">⚡ powered by Ramp</span></div>
  </div>
</div>

<!-- Chat -->
<div id="chat-screen">
  <div class="model-bar">
    <span class="model-label">Model</span>
    <div class="model-pills">
      <button class="model-pill" data-model="claude-haiku-4-5-20251001" onclick="selectModel(this)">
        Haiku <span class="pill-tag">fast</span>
      </button>
      <button class="model-pill active" data-model="claude-sonnet-4-20250514" onclick="selectModel(this)">
        Sonnet <span class="pill-tag">balanced</span>
      </button>
      <button class="model-pill" data-model="claude-opus-4-20250514" onclick="selectModel(this)">
        Opus <span class="pill-tag">powerful</span>
      </button>
    </div>
  </div>
  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="icon">⚡</div>
      <p id="empty-model-label">claude-sonnet is ready. start building.</p>
    </div>
  </div>
  <div id="attachments-preview" class="attachments-preview"></div>
  <div class="input-bar">
    <div class="input-row">
      <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="attach image or PDF">📎</button>
      <input id="file-input" type="file" accept="image/*,.pdf" multiple style="display:none" onchange="handleFiles(this.files)" />
      <textarea id="input" rows="1" placeholder="message claude..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
      <button class="stop-btn" id="stop-btn" onclick="stopStream()" title="stop">⏹</button>
    </div>
    <div class="input-meta">
      <span id="token-counter"></span>
      <button class="clear-btn" onclick="clearConversation()">clear conversation</button>
    </div>
  </div>
  <div class="drag-overlay" id="drag-overlay">drop files to attach</div>
</div>

<script>
  // ── model selection ──────────────────────────────────────────────
  var selectedModel = localStorage.getItem("tc_model") || "claude-sonnet-4-20250514";

  function selectModel(btn) {
    document.querySelectorAll(".model-pill").forEach(function(p) { p.classList.remove("active"); });
    btn.classList.add("active");
    selectedModel = btn.dataset.model;
    localStorage.setItem("tc_model", selectedModel);
    var name = btn.childNodes[0].textContent.trim();
    var label = document.getElementById("empty-model-label");
    if (label) label.textContent = "claude-" + name.toLowerCase() + " is ready. start building.";
  }

  document.querySelectorAll(".model-pill").forEach(function(p) {
    p.classList.toggle("active", p.dataset.model === selectedModel);
  });

  // ── theme ──────────────────────────────────────────────────────────
  var html = document.documentElement;

  function applyTheme(dark) {
    html.classList.toggle("dark", dark);
    var btn = document.getElementById("theme-toggle");
    if (btn) btn.textContent = dark ? "☀️" : "🌙";
  }

  function toggleTheme() {
    var isDark = !html.classList.contains("dark");
    localStorage.setItem("tc_theme", isDark ? "dark" : "light");
    applyTheme(isDark);
  }

  (function() {
    var saved = localStorage.getItem("tc_theme");
    applyTheme(saved ? saved === "dark" : true);
  })();

  // ── state ───────────────────────────────────────────────────────────
  var apiKey = localStorage.getItem("tc_api_key") || "";
  var history = [];
  var isLoading = false;
  var pendingFiles = [];
  var abortController = null;

  if (apiKey) showChat();

  // ── auth ────────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll(".tab").forEach(function(t, i) {
      t.classList.toggle("active", (i === 0) === (tab === "login"));
    });
    document.getElementById("login-form").style.display = tab === "login" ? "" : "none";
    document.getElementById("register-form").style.display = tab === "register" ? "" : "none";
    document.getElementById("auth-error").textContent = "";
  }

  function login() {
    var key = document.getElementById("login-key").value.trim();
    if (!key) { setError("paste your api key first."); return; }
    setError("");
    apiKey = key;
    localStorage.setItem("tc_api_key", key);
    showChat();

  // ── markdown ────────────────────────────────────────────────────────
  function renderMarkdown(text) {
    var html = text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/```[\w]*[\s\S]*?```/g, function(m) {
        var lang = (m.match(/^```(\w*)/) || [])[1] || "";
        var code = m.replace(/^```\w*\n?/, "").replace(/```$/, "").trim();
        return '<pre data-lang="' + lang + '"><button class="copy-code-btn" onclick="copyCode(this)">copy</button><code>' + code + "</code></pre>";
      })
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.+?)\*/g, "<em>$1</em>")
      .replace(/^### (.+)$/gm, "<h3>$1</h3>")
      .replace(/^## (.+)$/gm, "<h2>$1</h2>")
      .replace(/^# (.+)$/gm, "<h1>$1</h1>")
      .replace(/^> (.+)$/gm, "<blockquote>$1</blockquote>")
      .replace(/^\s*[-*] (.+)$/gm, "<li>$1</li>")
      .replace(/^\d+\. (.+)$/gm, "<li>$1</li>")
      .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/\n\n+/g, "</p><p>")
      .replace(/\n/g, "<br>");
    return "<p>" + html + "</p>";
  }

  function copyCode(btn) {

  // ── send ─────────────────────────────────────────────────────────────
  function sendMessage() {
    var input = document.getElementById("input");
    var text = input.value.trim();
    if ((!text && pendingFiles.length === 0) || isLoading) return;

    var emptyState = document.getElementById("empty-state");
    if (emptyState) emptyState.remove();

    var userContent;
    if (pendingFiles.length > 0) {
      userContent = [];
      pendingFiles.forEach(function(f) {
        if (f.type.startsWith("image/")) {
          userContent.push({ type: "image", source: { type: "base64", media_type: f.type, data: f.b64 } });
        } else if (f.type === "application/pdf") {
          userContent.push({ type: "document", source: { type: "base64", media_type: "application/pdf", data: f.b64 } });
        }
      });
      if (text) userContent.push({ type: "text", text: text });
    } else {
      userContent = text;
    }

    history.push({ role: "user", content: userContent });
    var displayText = text || pendingFiles.map(function(f) { return f.name; }).join(", ");
    appendMessage("user", displayText);

    pendingFiles = [];
    renderAttachmentPreviews();
    input.value = "";
    input.style.height = "auto";

    setLoadingState(true);
    abortController = new AbortController();

    var msgs = document.getElementById("messages");
    var wrap = document.createElement("div");
    wrap.className = "msg assistant";
    var avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "R";
    var bubble = document.createElement("div");
    bubble.className = "bubble md stream-cursor";
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;

    var fullText = "";

    fetch("/chat-stream", {
      method: "POST",
      headers: { "content-type": "application/json", "x-api-key": apiKey },
      body: JSON.stringify({ messages: history, model: selectedModel }),
      signal: abortController.signal
    }).then(function(res) {
      if (res.status === 401) {
        localStorage.removeItem("tc_api_key");
        wrap.remove();
        appendMessage("assistant", "your api key was rejected. please refresh and re-enter it.");
        setLoadingState(false);
        return;
      }
      if (res.status === 403) {
        return res.json().then(function(err) {
          wrap.remove();
          appendMessage("assistant", err.detail || "your access has expired. reach out to the ramp recruiting team.");
          setLoadingState(false);
        });
      }
      if (res.status === 429) {
        return res.json().then(function(err) {
          wrap.remove();
          appendMessage("assistant", err.detail || "slow down! too many messages — wait a moment and try again.");
          setLoadingState(false);
        });
      }

      var reader = res.body.getReader();
      var decoder = new TextDecoder();

      function pump() {
        return reader.read().then(function(result) {
          if (result.done) return;
          var chunk = decoder.decode(result.value, { stream: true });
          var chunkLines = chunk.split("\n");
          chunkLines.forEach(function(line) {
            if (!line.startsWith("data: ")) return;
            var data = line.slice(6).trim();
            if (data === "[DONE]") return;
            try {
              var evt = JSON.parse(data);
              if (evt.type === "content_block_delta" && evt.delta && evt.delta.type === "text_delta") {
                fullText += evt.delta.text;
                bubble.innerHTML = renderMarkdown(fullText);
                bubble.classList.add("stream-cursor");
                msgs.scrollTop = msgs.scrollHeight;
              }
            } catch(e) {}
          });
          return pump();
        });
      }

      return pump();
    }).catch(function(e) {
      if (e.name !== "AbortError") {
        wrap.remove();
        appendMessage("assistant", "something went wrong. try again.");
      }
    }).finally(function() {
      bubble.classList.remove("stream-cursor");
      var actions = document.createElement("div");
      actions.className = "msg-actions";
      actions.innerHTML = '<button class="msg-action-btn" onclick="copyMsgText(this)">copy</button>';
      actions._rawText = fullText;
      wrap.appendChild(actions);
      if (fullText) {
        history.push({ role: "assistant", content: fullText });
        saveHistory();
        updateTokenCounter();
      }
      setLoadingState(false);
      abortController = null;
      document.getElementById("input").focus();
    });
  }

  function copyMsgText(btn) {
    var text = btn.parentElement._rawText || "";
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = "copied!";
      setTimeout(function() { btn.textContent = "copy"; }, 1500);
    });
  }

  // ── append message ───────────────────────────────────────────────────
  function appendMessage(role, text, extraClass) {
    extraClass = extraClass || "";
    var msgs = document.getElementById("messages");
    var wrap = document.createElement("div");
    wrap.className = "msg " + role + (extraClass ? " " + extraClass : "");

    var avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "assistant" ? "R" : "You";

    var bubble = document.createElement("div");

    if (role === "assistant" && extraClass !== "typing") {
      bubble.className = "bubble md";
      bubble.innerHTML = renderMarkdown(text);
      var actions = document.createElement("div");
      actions.className = "msg-actions";
      actions.innerHTML = '<button class="msg-action-btn" onclick="copyMsgText(this)">copy</button>';
      actions._rawText = text;
      wrap.appendChild(avatar);
      wrap.appendChild(bubble);
      wrap.appendChild(actions);
    } else {
      bubble.className = "bubble";
      bubble.textContent = text;
      wrap.appendChild(avatar);
      wrap.appendChild(bubble);
    }

    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return wrap;
  }

    // ── auth background canvas ──────────────────────────────────────
  (function() {
    const canvas = document.getElementById('auth-canvas');
    const ctx = canvas.getContext('2d');

    const CHAR_POOL = '{}[]()<>=+*&|!?@#$%^~;:.,0123456789abcdefABCDEFxyz_-';
    const COL_WIDTH = 7.5;
    const ROW_HEIGHT = 17;
    const FONT_SIZE = 11;
    const MOUSE_RADIUS = 130;
    const CARD_RADIUS = 80;

    // Use Ramp brand palette
    const COLOURS_LIGHT = [
      [30, 30, 30],
      [60, 60, 60],
      [80, 80, 80],
      [120, 140, 0],   // ramp yellow-green tint
      [40, 40, 40],
      [100, 100, 100],
    ];
    const COLOURS_DARK = [
      [232, 255, 71],  // #e8ff47 ramp green
      [200, 220, 40],
      [255, 255, 255],
      [180, 180, 180],
      [232, 255, 71],
      [150, 200, 50],
    ];

    const PHRASES = [
      'build something', 'ship it', 'iterate fast',
      'spend smarter', 'move quickly', 'prove it',
      'close faster', 'real-time', 'automate',
      'emerging talent', 'full stack', 'finance infra',
      'cracked engineer', 'ramp it up', 'production ready',
      'type safe', 'zero to one', 'scale this',
      'builders.ramp.com/emerging-talent',
    ];
    const EASTER_EGG_TEXT = 'builders.ramp.com/emerging-talent';
    const EASTER_EGG_URL = 'https://builders.ramp.com/emerging-talent';

    const FONT = `400 ${FONT_SIZE}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace`;
    const FLOAT_FONT = '300 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';

    let cols = 0, rows = 0, grid = [], floaters = [], cardRects = [];
    let mouse = { x: -9999, y: -9999 };
    let lastTime = 0, nextFloat = 1 + Math.random() * 2;
    let phraseData = [];

    function randChar() { return CHAR_POOL[Math.floor(Math.random() * CHAR_POOL.length)]; }

    function distToRect(px, py, rect) {
      const dx = Math.max(rect.x - px, 0, px - (rect.x + rect.w));
      const dy = Math.max(rect.y - py, 0, py - (rect.y + rect.h));
      return Math.sqrt(dx * dx + dy * dy);
    }

    function buildPhraseData() {
      ctx.font = FLOAT_FONT;
      phraseData = PHRASES.map(text => {
        const widths = Array.from(text).map(ch => ctx.measureText(ch).width || 6);
        return { text, widths, totalWidth: widths.reduce((a, b) => a + b, 0) };
      });
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      const W = window.innerWidth, H = window.innerHeight;
      canvas.width = W * dpr; canvas.height = H * dpr;
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cols = Math.ceil(W / COL_WIDTH) + 2;
      rows = Math.ceil(H / ROW_HEIGHT) + 24;
      grid = Array.from({ length: cols }, (_, ci) => ({
        speed: 10 + Math.sin(ci * 0.37) * 5 + Math.random() * 8,
        offset: Math.random() * rows * ROW_HEIGHT,
        chars: Array.from({ length: rows }, () => ({
          char: randChar(),
          brightness: 0.03 + Math.random() * 0.12,
          colorIdx: Math.floor(Math.random() * COLOURS_LIGHT.length),
          phase: Math.random() * Math.PI * 2,
        })),
      }));
      buildPhraseData();
    }

    function updateCardRects() {
      cardRects = Array.from(document.querySelectorAll('[data-bg-card]')).map(el => {
        const r = el.getBoundingClientRect();
        return { x: r.left, y: r.top, w: r.width, h: r.height };
      });
    }

    function draw(now) {
      if (!canvas.isConnected) return;
      requestAnimationFrame(draw);

      // Hide canvas when auth screen is not shown
      const authScreen = document.getElementById('auth-screen');
      const authVisible = authScreen && authScreen.style.display !== 'none' && getComputedStyle(authScreen).display !== 'none';
      canvas.classList.toggle('hidden', !authVisible);
      if (!authVisible) return;

      const dt = lastTime ? Math.min((now - lastTime) / 1000, 0.1) : 0;
      lastTime = now;
      const W = window.innerWidth, H = window.innerHeight;
      const T = now * 0.001;
      const isDark = document.documentElement.classList.contains('dark');
      const COLOURS = isDark ? COLOURS_DARK : COLOURS_LIGHT;
      const bgAlphaMax = isDark ? 0.6 : 0.35;

      ctx.clearRect(0, 0, W, H);
      ctx.font = FONT;
      ctx.textBaseline = 'top';
      ctx.textAlign = 'left';

      const totalH = rows * ROW_HEIGHT;

      for (let c = 0; c < cols; c++) {
        const col = grid[c];
        col.offset = (col.offset + col.speed * dt) % totalH;
        const cx = c * COL_WIDTH;
        if (cx > W + COL_WIDTH) continue;

        for (let r = 0; r < rows; r++) {
          let cy = r * ROW_HEIGHT - col.offset;
          if (cy < -ROW_HEIGHT) cy += totalH;
          if (cy > H + ROW_HEIGHT) continue;

          const cell = col.chars[r];
          const cellX = cx + COL_WIDTH / 2;
          const cellY = cy + ROW_HEIGHT / 2;

          let cardFade = 1;
          for (const rect of cardRects) {
            const d = distToRect(cellX, cellY, rect);
            if (d < CARD_RADIUS) cardFade = Math.min(cardFade, d / CARD_RADIUS);
          }
          if (cardFade < 0.01) continue;

          const dx = cellX - mouse.x, dy = cellY - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          let repulse = 0, rx = 0, ry = 0;
          if (dist < MOUSE_RADIUS && dist > 0) {
            repulse = Math.pow(1 - dist / MOUSE_RADIUS, 1.8);
            rx = (dx / dist) * repulse * 12;
            ry = (dy / dist) * repulse * 12;
          }

          const pulse = Math.sin(T * 1.2 + cell.phase) * 0.02;
          const alpha = Math.min((cell.brightness + repulse * 0.4 + pulse) * cardFade * (isDark ? 4 : 2.5), bgAlphaMax);
          if (alpha < 0.005) continue;

          const col_ = COLOURS[cell.colorIdx];
          ctx.globalAlpha = alpha;
          ctx.fillStyle = `rgb(${col_[0]},${col_[1]},${col_[2]})`;
          ctx.fillText(cell.char, cx + rx, cy + ry);
          if (Math.random() < 2e-4) cell.char = randChar();
        }
      }

      // floating phrases
      nextFloat -= dt;
      if (nextFloat <= 0 && floaters.length < 5) {
        // spawn easter egg roughly every 4th floater
        const spawnEgg = Math.random() < 0.25 && !floaters.some(f => f.text === EASTER_EGG_TEXT);
        const pd = spawnEgg
          ? phraseData.find(p => p.text === EASTER_EGG_TEXT)
          : phraseData.filter(p => p.text !== EASTER_EGG_TEXT)[Math.floor(Math.random() * (phraseData.length - 1))];
        floaters.push({
          ...pd,
          x: Math.random() * Math.max(10, W - pd.totalWidth),
          y: H + 20,
          speed: spawnEgg ? 14 : 18 + Math.random() * 22,
          colorIdx: Math.floor(Math.random() * COLOURS.length),
        });
        nextFloat = 4 + Math.random() * 6;
      }

      ctx.font = FLOAT_FONT;
      floaters = floaters.filter(fl => {
        fl.y -= fl.speed * dt;
        if (fl.y < -30) return false;
        const edgeFadeTop = Math.min((H - fl.y) / (H * 0.12), 1);
        const edgeFadeBot = Math.min((fl.y + 30) / (H * 0.12), 1);
        const isEgg = fl.text === EASTER_EGG_TEXT;
        const baseAlpha = isEgg ? (isDark ? 0.28 : 0.13) * edgeFadeTop * edgeFadeBot
                                : (isDark ? 0.18 : 0.07) * edgeFadeTop * edgeFadeBot;
        // Check if mouse is hovering over this egg
        const eggHovered = isEgg && mouse.x >= fl.x && mouse.x <= fl.x + fl.totalWidth
                        && mouse.y >= fl.y - 4 && mouse.y <= fl.y + 18;
        let x = fl.x;
        const COLOURS_NOW = isDark ? COLOURS_DARK : COLOURS_LIGHT;
        for (let i = 0; i < fl.text.length; i++) {
          const ch = fl.text[i];
          const cw = fl.widths[i];
          if (ch === ' ') { x += cw; continue; }
          const charCx = x + cw / 2;
          let cardFade = 1;
          for (const rect of cardRects) {
            const d = distToRect(charCx, fl.y, rect);
            if (d < CARD_RADIUS) cardFade = Math.min(cardFade, d / CARD_RADIUS);
          }
          const ddx = charCx - mouse.x, ddy = fl.y - mouse.y;
          const ddist = Math.sqrt(ddx * ddx + ddy * ddy);
          const mouseLift = !isEgg && ddist < MOUSE_RADIUS ? Math.pow(1 - ddist / MOUSE_RADIUS, 1.8) * 0.2 : 0;
          const hoverBoost = eggHovered ? 0.08 : 0;
          const alpha = Math.min((baseAlpha + mouseLift + hoverBoost) * cardFade, isEgg ? 0.45 : 0.35);
          if (alpha > 0.005) {
            const c_ = isEgg ? (isDark ? [232, 255, 71] : [80, 80, 80]) : COLOURS_NOW[fl.colorIdx];
            // subtle glow for egg
            if (isEgg) {
              ctx.save();
              ctx.shadowColor = isDark ? 'rgba(232,255,71,0.35)' : 'rgba(0,0,0,0.18)';
              ctx.shadowBlur = eggHovered ? 8 : 4;
            }
            ctx.globalAlpha = alpha;
            ctx.fillStyle = `rgb(${c_[0]},${c_[1]},${c_[2]})`;
            ctx.font = isEgg ? '300 13px monospace' : FLOAT_FONT;
            ctx.fillText(ch, x, fl.y);
            if (isEgg) ctx.restore();
          }
          x += cw;
        }
        if (isEgg) ctx.font = FLOAT_FONT;
        return true;
      });

      ctx.globalAlpha = 1;
    }

    const ro = new ResizeObserver(updateCardRects);
    ro.observe(document.body);
    window.addEventListener('scroll', updateCardRects, { passive: true });
    window.addEventListener('mousemove', e => {
      mouse.x = e.clientX; mouse.y = e.clientY;
      // Check if hovering over easter egg floater
      let onEgg = false;
      for (const fl of floaters) {
        if (fl.text !== EASTER_EGG_TEXT) continue;
        if (e.clientX >= fl.x && e.clientX <= fl.x + fl.totalWidth &&
            e.clientY >= fl.y - 4 && e.clientY <= fl.y + 18) {
          onEgg = true; break;
        }
      }
      canvas.style.cursor = onEgg ? 'pointer' : 'default';
    });
    canvas.addEventListener('click', e => {
      for (const fl of floaters) {
        if (fl.text !== EASTER_EGG_TEXT) continue;
        if (e.clientX >= fl.x && e.clientX <= fl.x + fl.totalWidth &&
            e.clientY >= fl.y - 4 && e.clientY <= fl.y + 18) {
          window.open(EASTER_EGG_URL, '_blank');
          break;
        }
      }
    });
    window.addEventListener('resize', resize);
    resize();
    updateCardRects();
    requestAnimationFrame(draw);
  })();
</script>
</body>
</html>
